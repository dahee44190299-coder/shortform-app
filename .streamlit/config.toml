# Streamlit Cloud 배포 + 로컬 공통 설정

[server]
# 업로드 파일 크기 제한 (영상 업로드용)
maxUploadSize = 200    # MB
maxMessageSize = 200   # MB
# Cloud에서는 0.0.0.0 자동, 로컬은 localhost
enableXsrfProtection = true
enableCORS = false

[browser]
gatherUsageStats = false  # Streamlit 사용통계 비활성화 (개인정보 보호)

[theme]
# Runway/Pika 다크 테마
base = "dark"
primaryColor = "#FF6B35"             # 주황 액센트
backgroundColor = "#0A0A0F"          # 진짜 다크 (검정에 가까운 보라)
secondaryBackgroundColor = "#13131A"  # 카드 배경
textColor = "#F4F4F8"
font = "sans serif"

[runner]
# 코드 변경 시 자동 reload (개발용, Cloud에서도 OK)
fastReruns = true
magicEnabled = true

[client]
# 사용자가 새로고침해도 토스트 안 사라지게
toolbarMode = "minimal"  # 사용자 환경에서는 우측 메뉴 최소화
showErrorDetails = true   # 에러 상세 표시 (디버깅 용이)
