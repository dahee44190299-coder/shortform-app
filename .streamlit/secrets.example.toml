# Streamlit Cloud Secrets 템플릿 — 이 파일을 .streamlit/secrets.toml로 복사하고 값 채우세요.
# Streamlit Cloud 배포 시: Settings → Secrets에 이 내용 그대로 붙여넣기 (값만 채워서)
#
# 모든 키는 빈 문자열 ""이어도 앱은 동작합니다.
# 키별 효과는 docs/DEPLOYMENT.md 참조.

# ── 필수 (없으면 AI 기능 비활성화) ──────────────────────────────
ANTHROPIC_API_KEY = ""

# ── Founder + 무료 티어 (Phase 4) ─────────────────────────────
# 콤마 구분된 user_id 목록 (이메일 또는 별명)
# 여기 등록된 사람은 모든 Pro 기능 영구 무료 + 초대 코드 발급 권한
FOUNDER_USER_IDS = "you@example.com"

# ── 선택 (무료 폴백 있음) ──────────────────────────────────────
YOUTUBE_API_KEY = ""        # 비우면 yt-dlp 자동 폴백
ELEVENLABS_API_KEY = ""     # 비우면 Edge TTS 자동 폴백
CLOVA_TTS_CLIENT_ID = ""    # 비우면 Edge TTS 자동 폴백
CLOVA_TTS_CLIENT_SECRET = ""

# ── 선택 (폴백 없음, 기능만 비활성화) ──────────────────────────
PEXELS_API_KEY = ""    # 비우면 Pexels 검색 비활성화
PIXABAY_API_KEY = ""   # 비우면 BGM 자동 검색 비활성화

# ── 쿠팡 파트너스 추적 링크 (Phase 1-B) ────────────────────────
# 둘 다 있으면 deeplink 자동 생성, 없으면 subId만 생성하고 수동 적용 안내
COUPANG_PARTNERS_ACCESS_KEY = ""
COUPANG_PARTNERS_SECRET_KEY = ""
